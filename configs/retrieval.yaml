retrieval:
  # Embedding backend: "tfidf" (default, no deps) or "sentence-transformers"
  embedding_backend: "tfidf"

  # Sentence-transformers model (used only when backend = "sentence-transformers")
  sentence_transformer_model: "all-MiniLM-L6-v2"

  # TF-IDF parameters
  tfidf:
    max_features: 10000
    ngram_range: [1, 2]
    sublinear_tf: true

  # Retrieval parameters
  top_k: 5
  score_threshold: 0.0   # minimum similarity score to include a chunk

  # Index persistence
  index:
    persist: true
    index_dir: "data/processed"
    index_filename: "retrieval_index.pkl"

chunking:
  strategy: "sliding_window"   # "sliding_window" | "sentence" | "fixed"
  chunk_size: 200              # target words per chunk
  chunk_overlap: 40            # overlap in words between adjacent chunks
  min_chunk_size: 30           # discard chunks shorter than this
  max_chunk_size: 400          # hard cap on chunk size

  # Metadata enrichment
  add_doc_metadata: true
  add_position_metadata: true
